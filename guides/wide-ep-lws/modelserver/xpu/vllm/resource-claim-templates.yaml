apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: xpu-decode-claim
  labels:
    llm-d.ai/role: decode
spec:
  spec:
    devices:
      requests:
        - name: intel
          exactly:
            deviceClassName: gpu.intel.com
            count: 2
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: xpu-prefill-claim
  labels:
    llm-d.ai/role: prefill
spec:
  spec:
    devices:
      requests:
        - name: intel
          exactly:
            deviceClassName: gpu.intel.com
            count: 2

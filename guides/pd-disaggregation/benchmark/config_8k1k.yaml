load:
  type: constant
  interval: 1.0
  stages:
  - rate: 1
    duration: 60
  # - rate: 2
  #   duration: 60
  # - rate: 4
  #   duration: 60
  # - rate: 8
  #   duration: 60
  # - rate: 16
  #   duration: 60
  base_seed: 12345    # Fixed seed for reproducible runs
api:
  type: completion
  streaming: true
server:
  type: vllm
  model_name: meta-llama/Llama-3.3-70B-Instruct
  base_url: http://35.209.55.248:80
  ignore_eos: true
tokenizer:
  pretrained_model_name_or_path: meta-llama/Llama-3.3-70B-Instruct
data:
  type: random
  input_distribution:  # distribution of number of input tokens
    min: 8192
    max: 8192
    mean: 8192
    std_dev: 0
    total_count: 100      # total number of prompts to generate to fit the above mentioned distribution constraints
  output_distribution:  # distribution of number of input tokens
    min: 1024
    max: 1024
    mean: 1024
    std_dev: 0
    total_count: 100    # total number of output lengths to generate to fit the above mentioned distribution constraints
report:
  request_lifecycle:
    summary: true
    per_stage: true
    per_request: false
  prometheus:
    summary: false
    per_stage: false

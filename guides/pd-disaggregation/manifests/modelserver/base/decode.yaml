apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-pd-llm-d-modelservice-decode
spec:
  replicas: 1
  selector:
    matchLabels:
      llm-d.ai/accelerator-vendor: nvidia
      llm-d.ai/guide: pd-disaggregation
      llm-d.ai/hardware-variant: gpu
      llm-d.ai/inference-serving: "true"
      llm-d.ai/model: gpt-oss-120b
      llm-d.ai/role: decode
  template:
    metadata:
      labels:
        llm-d.ai/accelerator-vendor: nvidia
        llm-d.ai/guide: pd-disaggregation
        llm-d.ai/hardware-variant: gpu
        llm-d.ai/inference-serving: "true"
        llm-d.ai/model: gpt-oss-120b
        llm-d.ai/role: decode
    spec:
      initContainers:
        - name: routing-proxy
          args:
            - --port=8000
            - --vllm-port=8200
            - --connector=nixlv2
            - --zap-encoder=json
            - --zap-log-level=debug
            - --secure-proxy=false
          image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.7.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources: {}
          restartPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
    
      serviceAccountName: ms-pd-llm-d-modelservice
      
      volumes:
        - emptyDir: {}
          name: metrics-volume
        - emptyDir:
            medium: Memory
            sizeLimit: 16Gi
          name: shm
        - emptyDir: {}
          name: torch-compile-cache
        - name: model-storage
          emptyDir:
            sizeLimit: 250Gi
        
      containers:
        - name: vllm
          image: ghcr.io/llm-d/llm-d-cuda:v0.6.0
          command: ["vllm", "serve"]
          args:
            - openai/gpt-oss-120b
            - --port
            - "8200"
            - --tensor-parallel-size
            - "4"
            - --served-model-name
            - "openai/gpt-oss-120b"
            - --block-size
            - "128"
            - --kv-transfer-config
            - '{"kv_connector":"NixlConnector", "kv_role":"kv_both"}'
            - --disable-uvicorn-access-log
            - --max-model-len
            - "32000"
          env:
          - name: VLLM_NIXL_SIDE_CHANNEL_HOST
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: DP_SIZE
            value: "1"
          - name: TP_SIZE
            value: "4"
          - name: DP_SIZE_LOCAL
            value: "1"
          - name: HF_HOME
            value: /model-cache
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: llm-d-hf-token
                key: HF_TOKEN
          ports:
          - containerPort: 8200
            name: vllm
            protocol: TCP
          - containerPort: 5600
            name: nixl
            protocol: TCP
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: vllm
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /v1/models
              port: vllm
            periodSeconds: 5
            timeoutSeconds: 2
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /v1/models
              port: vllm
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            limits:
              cpu: "16"
              memory: 64Gi
              nvidia.com/gpu: "4"
              rdma/ib: 1
            requests:
              cpu: "16"
              memory: 64Gi
              nvidia.com/gpu: "4"
              rdma/ib: 1
          volumeMounts:
            - mountPath: /.config
              name: metrics-volume
            - mountPath: /dev/shm
              name: shm
            - mountPath: /.cache
              name: torch-compile-cache
            - name: model-storage
              mountPath: /model-cache

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../../recipes/modelserver/base/single-host/default
  - resourceclaimtemplate.yaml

namePrefix: xpu-vllm-

images:
  - name: REPLACE_MODEL_SERVER_IMAGE
    newName: ghcr.io/llm-d/llm-d-xpu-dev
    newTag: pr-1731

labels:
  - pairs:
      llm-d.ai/model: Qwen3-8B
      llm-d.ai/guide: tiered-prefix-cache
      llm-d.ai/accelerator-variant: xpu
      llm-d.ai/accelerator-vendor: intel
    includeSelectors: true
    includeTemplates: true
patches:
  - path: patch-vllm.yaml
